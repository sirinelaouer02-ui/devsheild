name: DevShield CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # =====================
  # JOB 1 : Tests + Lint
  # =====================
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint avec flake8
        run: |
          # Arrête le build si erreur de syntaxe ou imports non utilisés
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings pour le reste (max 100 chars par ligne)
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Tests unitaires
        run: |
          pytest tests/ -v --tb=short

  # =====================
  # JOB 2 : Build Docker
  # =====================
  build:
    name: Build & Scan Docker
    runs-on: ubuntu-latest
    needs: test  # Lance seulement si les tests passent

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t devsheild:${{ github.sha }} .

      - name: Scan de sécurité avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsheild:${{ github.sha }}'
          format: 'table'
          exit-code: '0'        # 0 = ne bloque pas le pipeline, juste affiche
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ==========================
  # JOB 3 : Déploiement
  # (seulement sur push main)
  # ==========================
  deploy:
    name: Déploiement sur Oracle Cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devsheild
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker compose ps
            echo "Déploiement terminé !"

- name: Déclenche le scan de sécurité DevShield
        run: |
          curl -X POST https://devshield.lenergy-smart.fr/api/webhook/scan/1 \
            -H "X-Webhook-Secret: ${{ secrets.DEVSHIELD_WEBHOOK_SECRET }}" \
            -H "X-Commit-Sha: ${{ github.sha }}"