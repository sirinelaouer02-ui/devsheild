{% extends 'base.html' %}
{% block title %}Connexion — DevShield{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="shield-icon-large">🛡️</span>
            <h1>DevShield</h1>
            <p>Plateforme de supervision de sécurité</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Ton identifiant">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <p class="auth-footer">
            Pas encore de compte ?
            <a href="{{ url_for('auth.register') }}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
