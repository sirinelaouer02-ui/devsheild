{% extends 'base.html' %}
{% block title %}Inscription — DevShield{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="shield-icon-large">🛡️</span>
            <h1>Créer un compte</h1>
            <p>Rejoins DevShield</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required minlength="3" placeholder="Minimum 3 caractères">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="ton@email.com">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="Minimum 8 caractères">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmer le mot de passe</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Répète ton mot de passe">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
        </form>

        <p class="auth-footer">
            Déjà un compte ?
            <a href="{{ url_for('auth.login') }}">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
